[build]
  publish = "."

# Description Generator — serve standalone page before SPA fallback
[[redirects]]
  from = "/tools/generator"
  to = "/generator.html"
  status = 200

# SPA fallback — Netlify serves real files first, then falls back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
