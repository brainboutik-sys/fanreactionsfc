[build]
  publish = "."
  functions = "netlify/functions"

# Bundle index.html with the creator-og function so it can read and
# rewrite the meta tags per creator.
[functions."creator-og"]
  included_files = ["index.html"]

# ── Scheduled functions ──────────────────────────────────────────────────
# Baseline live-check: every 30 minutes — safety net for anything the
# fixture-aware trigger below doesn't cover (postponed/unlisted streams).
[functions."live-check"]
schedule = "*/30 * * * *"

# Daily fixtures sync from football-data.org — populates frfc_fixtures for
# every league/competition FanReactionsFC covers.
[functions."fixtures-sync"]
schedule = "30 4 * * *"

# Fixture-aware live-check: every 5 minutes, fires ~5 minutes before kickoff
# for creators tied to the two clubs playing (World Cup fixtures check every
# creator instead, since watchalongs aren't nation-limited in practice). See
# live-check-fixtures-background.js for why it does a real playlist-head
# refresh instead of just re-checking a stale ID — this replaces the old
# blanket-hours live-check-peak.js. Background function (up to 15 min) since
# a broad World Cup check touches all ~265 creators.
[functions."live-check-fixtures-background"]
schedule = "*/5 * * * *"

# Dynamic sitemap generated from the Supabase creator list.
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Per-creator OG cards — serve HTML with creator-specific meta tags
# for social crawlers. Human users still get the SPA since the
# function returns the same index.html structure with scripts intact.
[[redirects]]
  from = "/creators/*"
  to = "/.netlify/functions/creator-og"
  status = 200

# Keep internal dev docs off the production domain (they still live in the
# repo/GitHub, just shouldn't be served from fanreactionsfc.com).
# force = true so the rule beats the real file that exists in publish dir.
[[redirects]]
  from = "/docs/*"
  to = "/index.html"
  status = 404
  force = true
[[redirects]]
  from = "/README.md"
  to = "/index.html"
  status = 404
  force = true
[[redirects]]
  from = "/CHANGES.md"
  to = "/index.html"
  status = 404
  force = true

# SPA fallback — Netlify serves real files first, then falls back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
